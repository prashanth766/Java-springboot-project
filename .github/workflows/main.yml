name: Full CI/CD Pipeline

# 🚀 Trigger pipeline when pushing to main branch
on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Build Spring Boot JAR
      - name: Build JAR
        working-directory: backend
        run: mvn clean install -DskipTests

      # 4️⃣ Stop old application on EC2
      - name: Stop Old Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "📁 Creating app directory"
            mkdir -p /home/ec2-user/app

            echo "🛑 Stopping old application if running"
            pkill -f datastore-0.0.7.jar || true

            echo "🗑 Removing old JAR file"
            rm -f /home/ec2-user/app/datastore-0.0.7.jar

      # 5️⃣ Upload new JAR to EC2
      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: "backend/target/datastore-0.0.7.jar"
          target: "/home/ec2-user/app"

      # 6️⃣ Start new application on EC2
      - name: Start Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "📁 Setting up log directory"
            sudo mkdir -p /var/log/app
            sudo chown ec2-user:ec2-user /var/log/app
            sudo chmod 755 /var/log/app

            echo "🚀 Starting application"
            cd /home/ec2-user/app

            nohup env \
            MYSQL_HOST=database-2.cabgooyqiqf5.us-east-1.rds.amazonaws.com \
            MYSQL_PORT=3306 \
            MYSQL_USERNAME=admin \
            MYSQL_PASSWORD=cloud123 \
            LOG_FILE_PATH=/var/log/app/datastore.log \
            java -jar datastore-0.0.7.jar \
            --server.port=8084 \
            > /var/log/app/nohup.out 2>&1 &

            echo "✅ Application Started Successfully"
