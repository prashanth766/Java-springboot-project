name: Full CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Build JAR
      - name: Build JAR
        run: mvn clean package -DskipTests=true
        working-directory: backend

      # 4️⃣ Prepare EC2 Directory
      - name: Prepare App Directory
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo mkdir -p /home/ec2-user/app
            sudo chown -R ec2-user:ec2-user /home/ec2-user/app
            rm -f /home/ec2-user/app/datastore-0.0.7.jar

      # 5️⃣ Upload JAR to EC2
      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: "backend/target/datastore-0.0.7.jar"
          target: "/home/ec2-user/app/"
          overwrite: true

      # 6️⃣ Stop Old App & Start New One
      - name: Deploy Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo mkdir -p /var/log/app
            sudo chown ec2-user:ec2-user /var/log/app
            sudo chmod 755 /var/log/app

            cd /home/ec2-user/app

            PID=$(pgrep -f datastore-0.0.7.jar || true)
            if [ -n "$PID" ]; then
              echo "Stopping existing app with PID: $PID"
              kill -9 $PID || true
            else
              echo "No existing application running"
            fi

            nohup env \
            MYSQL_HOST=database-1.c2xkcguk0xym.us-east-1.rds.amazonaws.com \
            MYSQL_PORT=3306 \
            MYSQL_USERNAME=admin \
            MYSQL_PASSWORD=cloud123 \
            LOG_FILE_PATH=/var/log/app/datastore.log \
            java -jar datastore-0.0.7.jar \
            --server.port=8084 \
            > /var/log/app/nohup.out 2>&1 &

            echo "🚀 Application Deployed Successfully"
