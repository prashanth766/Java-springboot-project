name: Full CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout SCM
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # # 3️⃣ Clean & Package + SonarQube Scan
      # - name: Sonar Scan
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #   run: |
      #     mvn clean verify sonar:sonar \
      #       -DskipTests \
      #       -Dsonar.projectKey=myproject \
      #       -Dsonar.host.url=${{ secrets.SONAR_URL }} \
      #       -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # 4️⃣ Quality Gate Check
      # - name: Quality Gate
      #   uses: sonarsource/sonarqube-quality-gate-action@v1
      #   timeout-minutes: 5
      #   with:
      #     scanMetadataReportFile: target/site/sonar/report-task.txt

      # 5️⃣ Build final JAR
      - name: Build JAR
        working-directory: backend
        run: mvn clean package -DskipTests=true

      # 6️⃣ Prepare EC2 folder and stop old app
      - name: Prepare EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p /home/ec2-user/app
            pkill -f datastore-0.0.7.jar || true
            rm -f /home/ec2-user/app/datastore-0.0.7.jar

      # 7️⃣ Upload JAR to EC2
      - name: Prepare EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p /home/ec2-user/app

            PID=$(pgrep -f datastore-0.0.7.jar || true)

            if [ -n "$PID" ]; then
              echo "Stopping application with PID: $PID"
              kill -9 $PID
            else
              echo "No running application found"
            fi

            rm -f /home/ec2-user/app/datastore-0.0.7.jar

      # 8️⃣ Run New Application
      - name: Run Application on EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo mkdir -p /var/log/app
            sudo chown ec2-user:ec2-user /var/log/app
            sudo chmod 755 /var/log/app

            cd /home/ec2-user/app

            nohup env \
            MYSQL_HOST=database-2.cabgooyqiqf5.us-east-1.rds.amazonaws.com \
            MYSQL_PORT=3306 \
            MYSQL_USERNAME=admin \
            MYSQL_PASSWORD=cloud123 \
            LOG_FILE_PATH=/var/log/app/datastore.log \
            java -jar datastore-0.0.7.jar \
            --server.port=8084 \
            > /var/log/app/nohup.out 2>&1 &

            echo "🚀 New Application Started"
